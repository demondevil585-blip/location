<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share Location</title>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; font-family: Arial, sans-serif; background: #f0f2f5; margin: 0; }
        .share-btn { padding: 20px 40px; font-size: 20px; font-weight: bold; color: white; background-color: #25D366; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .share-btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <button class="share-btn" onclick="shareLocation('60188702526')">📍 Share My Location</button>

    <script>
        function shareLocation(myPhone) {
            if (!navigator.geolocation) {
                alert("Geolocation is not supported by your browser.");
                return;
            }
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    const mapLink = `https://google.com{lat},${lon}`;
                    const message = encodeURIComponent(`Hey! Here is my current location: ${mapLink}`);
                    window.location.href = `https://wa.me{myPhone}?text=${message}`;
                },
                (error) => {
                    alert("Error getting location. Please enable location permissions.");
                },
                { enableHighAccuracy: true }
            );
        }
    </script>
</body>
</html>
